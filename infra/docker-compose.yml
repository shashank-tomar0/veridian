services:
  # ── Application Services ───────────────────────────────────────────────────

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: ../.env
    depends_on:
      - postgres
      - redis
      - qdrant
      - neo4j
      - minio
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ..:/app

  worker-text:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    env_file: ../.env
    depends_on:
      - redis
      - postgres
    command: celery -A workers.celery_app:celery_app worker -Q text -c 4 --loglevel=info
    volumes:
      - ..:/app

  worker-image:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    env_file: ../.env
    depends_on:
      - redis
      - postgres
    command: celery -A workers.celery_app:celery_app worker -Q image -c 2 --loglevel=info
    volumes:
      - ..:/app

  worker-audio:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    env_file: ../.env
    depends_on:
      - redis
      - postgres
    command: celery -A workers.celery_app:celery_app worker -Q audio -c 2 --loglevel=info
    volumes:
      - ..:/app

  worker-video:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    env_file: ../.env
    depends_on:
      - redis
      - postgres
    command: celery -A workers.celery_app:celery_app worker -Q video -c 1 --loglevel=info
    volumes:
      - ..:/app

  beat:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    env_file: ../.env
    depends_on:
      - redis
    command: celery -A workers.celery_app:celery_app beat --loglevel=info
    volumes:
      - ..:/app

  dashboard:
    build:
      context: ../dashboard
      dockerfile: ../infra/Dockerfile.dashboard
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000

  # ── Infrastructure Services ────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: veridian
      POSTGRES_PASSWORD: password
      POSTGRES_DB: veridian
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veridian"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  neo4j_data:
  minio_data:
