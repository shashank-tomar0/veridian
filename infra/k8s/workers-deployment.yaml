# ── Text Worker ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: veridian-worker-text
  labels:
    app: veridian
    component: worker-text
spec:
  replicas: 2
  selector:
    matchLabels:
      app: veridian
      component: worker-text
  template:
    metadata:
      labels:
        app: veridian
        component: worker-text
    spec:
      containers:
        - name: worker-text
          image: veridian/worker:latest
          command: ["celery", "-A", "workers.celery_app:celery_app", "worker", "-Q", "text", "-c", "4", "--loglevel=info"]
          envFrom:
            - secretRef:
                name: veridian-secrets
            - configMapRef:
                name: veridian-config
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: veridian-worker-text-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: veridian-worker-text
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
---
