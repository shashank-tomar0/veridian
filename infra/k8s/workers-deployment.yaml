# ── Audio Worker (GPU) ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: veridian-worker-audio
  labels:
    app: veridian
    component: worker-audio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: veridian
      component: worker-audio
  template:
    metadata:
      labels:
        app: veridian
        component: worker-audio
    spec:
      nodeSelector:
        gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: worker-audio
          image: veridian/worker-gpu:latest
          command: ["celery", "-A", "workers.celery_app:celery_app", "worker", "-Q", "audio", "-c", "1", "--loglevel=info"]
          envFrom:
            - secretRef:
                name: veridian-secrets
            - configMapRef:
                name: veridian-config
          resources:
            requests:
              cpu: "1000m"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4000m"
              memory: "16Gi"
              nvidia.com/gpu: "1"
---
