# ── TorchServe ML Inference ──────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: torchserve-config
data:
  config.properties: |
    inference_address=http://0.0.0.0:8080
    management_address=http://0.0.0.0:8081
    metrics_address=http://0.0.0.0:8082
    model_store=/home/model-server/model-store
    load_models=all
    max_response_size=67108864
    default_workers_per_model=1
    job_queue_size=100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: veridian-ml-serving
  labels:
    app: veridian
    component: ml-serving
spec:
  replicas: 1
  selector:
    matchLabels:
      app: veridian
      component: ml-serving
  template:
    metadata:
      labels:
        app: veridian
        component: ml-serving
    spec:
      nodeSelector:
        gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: torchserve
          image: pytorch/torchserve:latest-gpu
          ports:
            - containerPort: 8080
              name: inference
            - containerPort: 8081
              name: management
            - containerPort: 8082
              name: metrics
          envFrom:
            - configMapRef:
                name: veridian-config
          volumeMounts:
            - name: config
              mountPath: /home/model-server/config.properties
              subPath: config.properties
            - name: model-store
              mountPath: /home/model-server/model-store
          resources:
            requests:
              cpu: "2000m"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8000m"
              memory: "32Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: torchserve-config
        - name: model-store
          persistentVolumeClaim:
            claimName: model-store-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: veridian-ml-serving
spec:
  selector:
    app: veridian
    component: ml-serving
  ports:
    - name: inference
      port: 8080
      targetPort: 8080
    - name: management
      port: 8081
      targetPort: 8081
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-store-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
