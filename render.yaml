services:
  # ── Veridian Neural Backend (API + Receipts) ───────────────────────────────
  - type: web
    name: veridian-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: veridian-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: veridian-cache
          property: connectionString
      - fromGroup: veridian-secrets

  # ── Veridian Telegram Bot (Autonomous Worker) ──────────────────────────────
  - type: worker
    name: veridian-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.telegram_bot
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: veridian-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: veridian-cache
          property: connectionString
      # Note: 'property: url' is not supported in fromService. 
      # Please add RENDER_EXTERNAL_URL to your 'veridian-secrets' group manually
      # format: https://veridian-engine.onrender.com
      - fromGroup: veridian-secrets

  # ── Veridian Forensic Workers (Analysis Nodes) ─────────────────────────────
  - type: worker
    name: veridian-forensic-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A workers.celery_app:celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: veridian-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: veridian-cache
          property: connectionString
      - fromGroup: veridian-secrets

  # ── Veridian Redis (Neural Cache) ──────────────────────────────────────────
  - type: redis
    name: veridian-cache
    plan: free
    ipAllowList: [] # Required line for blueprint validation

databases:
  - name: veridian-db
    plan: free
